name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check bio_firewall tests
      - name: Test (incl. the license gate)
        env:
          PEN_STACK_SAFETY_AUDIT: /tmp/bf_safety_audit.log   # writable path for the PEN-STACK Guardian's audit log
        run: pytest -q
