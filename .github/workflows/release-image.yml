name: Release image

# Publishes the reproduction image to the GitHub Container Registry. The Dockerfile smoke-tests screen()
# and the signed hazard KB at build time, so a broken image fails here rather than reaching a reader.
# Runs when a release is published, and on demand for a re-publish of an existing tag.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Tag to build (for example v0.1.0)
        required: true
        default: v0.1.0

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Derive the version from the tag
        id: version
        run: |
          REF="${{ github.event.inputs.ref || github.ref_name }}"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Check the tag matches the packaged version
        run: |
          PKG=$(python -c "import re,pathlib; print(re.search(r'^version = \"([^\"]+)\"', pathlib.Path('pyproject.toml').read_text(), re.M).group(1))")
          if [ "$PKG" != "${{ steps.version.outputs.version }}" ]; then
            echo "tag ${{ steps.version.outputs.version }} does not match pyproject version $PKG"
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Authenticate to the registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.title=BioFirewall
            org.opencontainers.image.description=Genome-writing-native biosecurity middleware that supervises agentic design AI
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Verify the published image screens and refuses a hazardous plan
        run: |
          IMG=${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.version.outputs.version }}
          docker pull "$IMG"
          docker run --rm "$IMG" python -c "from bio_firewall import screen; from bio_firewall.kb import load_kb, verify_kb; assert verify_kb(load_kb()); assert screen({'cargo': {'function': 'ricin toxin'}})['decision'] == 'refuse'; print('published image verified')"
