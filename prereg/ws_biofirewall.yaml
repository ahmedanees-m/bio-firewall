    syscard: "DONE (docs/SYSTEM_CARD.md). What a green allow does/does-NOT guarantee; false-refuse ceiling = a ceiling
      on OVER-refusal not hazard-catch; in/out-of-scope; 9 failure modes; a scope/limit line per headline claim."
    integrate: "DONE. bio_firewall/integrate + examples/agent_integration.py: synthesize() HARD-GATED on a verifiable
