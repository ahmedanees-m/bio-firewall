# BioFirewall WS-CLOUDLAB-GATE - gate the PEN-STACK 7.0 Stage J cloud-lab execution bridge (v0.9.1). SHA-lock first.
id: ws_cloudlab_gate
objective: no cloud-lab submission proceeds without a verified BioFirewall allow passport that matches the design (in-workflow gate)
penstack_surface_verified:
  module: "pen_stack.build.cloudlab.submit(design, experiment, *, provider='mock', target='opentrons', actor) raises ProtocolExportError on block"
  gated: "pen_stack.build.cloudlab.submit_gated(design, experiment, **kw) returns {submitted, blocked, ...} (pen-stack's OWN gate runs inside)"
  mcp_tool: "pen_stack.agent.mcp_server.cloudlab_submit -> submit_gated; api/manifest registers 'cloudlab_submit'"
method: >-
  adapter intercepts the submission: run screen(design); call pen-stack submit ONLY on a verified, HMAC-signed allow
  passport whose inputs_hash matches the design; flag_for_review -> held; refuse -> blocked. pen-stack's own gate is the
  necessary-not-sufficient in-design gate; BioFirewall (Stage K) is the comprehensive screen and runs FIRST.
acceptance:
  - 0 hazardous test designs reach the (mock) submission endpoint without a valid allow passport
  - legitimate designs blocked 0/N, with a Clopper-Pearson upper bound consistent with the certified false-refuse ceiling
  - gate decision tamper-evident (mutating the passport, or the design after screening, breaks the HMAC / inputs_hash match)
honest_failure: "pen-stack's cloud-lab endpoint is mock/dry-run; tests assert the INTERCEPTION CONTRACT (nothing reaches submission without an allow passport), not a real wet run; real-execution enforcement pending a real provider"
scope: "the gate is the mechanism, not a deployed execution authority; governs pen-stack via the adapter, does not modify it"
locked_before_results: true
sha256_lock: "git-locked at release tag v0.9.1 (prereg + code committed together; tests are deterministic)"
